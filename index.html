<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャラクター診断 v3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #E8607A; --pink-light: #FBEAF0; --pink-dark: #9C3050;
    --purple: #7C5CBF; --gold: #C9973A;
    --bg: #FDF8F5; --card: #FFFFFF; --text: #1E1510; --muted: #7A6A62;
    --border: rgba(200,160,140,0.25); --radius: 16px;
  }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(232,96,122,0.07) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(124,92,191,0.07) 0%, transparent 50%);
  }
  .container { width: 100%; max-width: 560px; }
  .header { text-align: center; margin-bottom: 28px; animation: fadeUp 0.6s ease both; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.2em; color: var(--pink); text-transform: uppercase; margin-bottom: 10px; }
  .header h1 { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; line-height: 1.5; }
  .header h1 span { color: var(--pink); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: 0 4px 24px rgba(200,120,120,0.08); animation: fadeUp 0.4s ease both; }
  .progress-wrap { margin-bottom: 22px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 4px; background: rgba(200,160,140,0.2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; transition: width 0.4s ease; }
  .question { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 700; line-height: 1.6; margin-bottom: 18px; }
  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }
  .opt-btn { display: block; width: 100%; text-align: left; padding: 12px 15px; background: #FDF8F5; border: 1px solid var(--border); border-radius: 12px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; color: var(--text); cursor: pointer; transition: all 0.2s ease; line-height: 1.5; }
  .opt-btn:hover { border-color: var(--pink); background: var(--pink-light); transform: translateX(3px); }
  .opt-btn.selected { border: 2px solid var(--pink); background: var(--pink-light); color: var(--pink-dark); font-weight: 500; }
  .navs { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .nav-btn { padding: 11px 20px; border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .nav-btn.back { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .nav-btn.back:hover { border-color: var(--muted); color: var(--text); }
  .nav-btn.next { background: var(--pink); border: none; color: #fff; flex: 1; text-align: center; }
  .nav-btn.next:hover { background: var(--pink-dark); transform: translateY(-1px); }
  .nav-btn.dimmed { opacity: 0.35; pointer-events: none; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 24px rgba(200,120,120,0.08); animation: fadeUp 0.6s ease both; }
  .result-hero { padding: 36px 28px 28px; text-align: center; }
  .result-icon { font-size: 64px; display: block; margin-bottom: 12px; animation: pop 0.5s ease both 0.2s; }
  .result-badge { display: inline-block; font-size: 11px; letter-spacing: 0.12em; color: var(--pink); background: rgba(232,96,122,0.12); padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
  .result-name { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .result-series { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 10px; }
  .result-keyword { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .kw { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(200,160,140,0.15); color: var(--muted); }
  .result-body { padding: 24px 28px; }
  .result-desc { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 24px; border-left: 3px solid var(--pink-light); padding-left: 14px; }
  .traits-title { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 14px; }
  .trait-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .trait-label { font-size: 12px; color: var(--muted); width: 68px; flex-shrink: 0; text-align: right; }
  .trait-track { flex: 1; height: 6px; background: rgba(200,160,140,0.15); border-radius: 3px; overflow: hidden; }
  .trait-bar { height: 100%; border-radius: 3px; transition: width 1s ease 0.3s; }
  .trait-val { font-size: 12px; font-weight: 500; color: var(--text); min-width: 20px; }
  .retry-btn { display: block; width: 100%; margin-top: 20px; padding: 13px; background: transparent; border: 1px solid var(--border); border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .retry-btn:hover { border-color: var(--pink); color: var(--pink); }
  .start-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 28px; text-align: center; box-shadow: 0 4px 24px rgba(200,120,120,0.08); animation: fadeUp 0.5s ease both; }
  .start-emoji { font-size: 48px; margin-bottom: 16px; display: block; }
  .start-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .start-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .start-cats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; text-align: left; }
  .start-cat { background: #FDF8F5; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--muted); }
  .start-cat strong { color: var(--text); font-size: 13px; display: block; margin-bottom: 3px; }
  .start-chars { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 24px; }
  .start-char { font-size: 20px; }
  .start-btn { width: 100%; padding: 14px; background: var(--pink); border: none; border-radius: 12px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.2s; }
  .start-btn:hover { background: var(--pink-dark); transform: translateY(-2px); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

  <div id="root"></div>
</div>

  {
    name:"織田信長タイプ", series:"戦国武将", icon:"🔥",
    keywords:["革新","カリスマ","時代変革","孤高"],
    desc:"時代を変える革新性と圧倒的なカリスマを持つ覇者。常識を打ち破り、誰も見たことのないビジョンで世界を動かす。中学生起業家のあなたに最も近い存在。",
    heroColor:"linear-gradient(135deg,#EDE7F6 0%,#D1C4E9 100%)",
    match:function(s){return s.lead>=9&&s.logic>=7&&s.wild>=5;}
  },
  {
    name:"ナイチンゲールタイプ", series:"近代看護の母", icon:"🕯️",
    keywords:["献身","改革","知性","優しさ"],
    desc:"純粋な優しさだけでなく、データと論理で社会を変えた革命家。弱い立場の人々のために戦う強さと、圧倒的な知性を兼ね備えた、真のリーダー。",
    heroColor:"linear-gradient(135deg,#E0F2F1 0%,#B2DFDB 100%)",
    match:function(s){return s.care>=8&&s.logic>=6&&s.lead>=5;}
  },
  {
    name:"篤姫タイプ", series:"幕末・薩摩", icon:"👘",
    keywords:["気品","強さ","愛","時代を生きる"],
    desc:"激動の時代を気品と強さで生き抜いた女性。与えられた環境に適応しながらも、決して自分の芯を曲げない。愛する人々のために静かに、でも力強く戦い続けた。",
    heroColor:"linear-gradient(135deg,#FCE4EC 0%,#FFF9C4 100%)",
    match:function(s){return s.adapt>=7&&s.emotion>=7&&s.cute>=4&&s.lead>=5;}
  },
  {
    name:"テイラー・スウィフトタイプ", series:"シンガーソングライター", icon:"🎵",
    keywords:["表現","再生","共感","自分らしさ"],
    desc:"傷ついても何度でも立ち上がり、その経験を最高のアートに変える。感情をそのまま言葉にする才能と、自分らしさを貫く強さを持つ。時代を超えて人の心に届く表現者。",
    heroColor:"linear-gradient(135deg,#FFF8E1 0%,#FCE4EC 100%)",
    match:function(s){return s.art>=8&&s.emotion>=6&&s.cute>=4;}
  },
  {
    name:"マリー・キュリータイプ", series:"ノーベル賞科学者", icon:"⚗️",
    keywords:["探究","信念","先駆者","知性"],
    desc:"誰もやったことのない領域に挑み続けた、知の先駆者。女性であることの壁も、時代の壁も、純粋な探究心と信念で突破した。世界で初めてノーベル賞を2度受賞した伝説。",
    heroColor:"linear-gradient(135deg,#E8EAF6 0%,#B2EBF2 100%)",
    match:function(s){return s.logic>=9&&s.action>=5&&s.wild>=3;}
  },
  {
    name:"坂本龍馬タイプ", series:"幕末志士", icon:"🌏",
    keywords:["自由","革命","行動","夢想家"],
    desc:"時代の壁をぶち壊し、誰も思いつかなかった方法で日本を動かした夢想家。自由を愛し、人を惹きつけるカリスマ性と、行動力を兼ね備えた幕末の星。",
    heroColor:"linear-gradient(135deg,#E0F7FA 0%,#FFF9C4 100%)",
    match:function(s){return s.action>=7&&s.adapt>=6&&s.lead>=6&&s.wild>=5;}
  },
  {
    name:"徳川家康タイプ", series:"戦国武将", icon:"🐢",
    keywords:["忍耐","戦略","慎重","天下人"],
    desc:"焦らず、耐えて、最後に天下を取った戦略家。感情より論理で動き、どんな逆境も辛抱強く乗り越える。「鳴くまで待とう」の精神で、最後に笑う人。",
    heroColor:"linear-gradient(135deg,#F1F8E9 0%,#DCEDC8 100%)",
    match:function(s){return s.logic>=8&&s.adapt>=7&&s.lead>=6;}
  }
];

var phase='start', cur=0;
var sc={action:0,logic:0,emotion:0,lead:0,cute:0,style:0,adapt:0,wild:0,care:0,art:0};
var ans=[];
for(var i=0;i<qs.length;i++) ans.push(null);

function getChar(){
  for(var i=0;i<chars.length;i++){ if(chars[i].match(sc)) return chars[i]; }
  // fallback: 最もスコアが高いキャラ
  var best=chars[0], bestSum=-1;
  for(var i=0;i<chars.length;i++){
    var keys=Object.keys(sc), sum=0;
    for(var k=0;k<keys.length;k++) sum+=sc[keys[k]];
    if(sum>bestSum){bestSum=sum;best=chars[i];}
  }
  return best;
}

function pct(v,max){ return Math.min(Math.round(v/max*100),100); }

function drawStart(){
  var root=document.getElementById('root');
  var icons=chars.map(function(c){return '<span class="start-char">'+c.icon+'</span>';}).join('');
  root.innerHTML='<div class="start-card">'
    +'<span class="start-emoji">✨</span>'
    +'<div class="start-title">あなたは誰に近い？全20人物から診断</div>'
    +'<div class="start-desc">漫画・アニメ・ゲーム・歴史上の人物・アーティストの中から、あなたに最も近い人物を8つの質問で診断します。</div>'
    +'<div class="start-cats">'
    +'<div class="start-cat"><strong>⚔️ 漫画・アニメ</strong>ルフィ、おでん、千尋、セーラームーン、五条悟、炭治郎、L</div>'
    +'<div class="start-cat"><strong>🎮 ゲーム</strong>マリオ、カービィ、メタナイト</div>'
    +'<div class="start-cat"><strong>🗡️ 新撰組</strong>沖田総司、土方歳三、近藤勇</div>'
    +'<div class="start-cat"><strong>🌏 歴史・著名人</strong>織田信長、ナイチンゲール、篤姫、テイラー・スウィフト、マリー・キュリー、坂本龍馬、徳川家康</div>'
    +'</div>'
    +'<div class="start-chars">'+icons+'</div>'
    +'<button class="start-btn" id="startBtn">診断スタート →</button>'
    +'</div>';
  document.getElementById('startBtn').addEventListener('click',function(){ phase='quiz'; draw(); });
}

function draw(){
  if(phase==='start'){ drawStart(); return; }
  var root=document.getElementById('root');
  if(cur<qs.length){
    var q=qs[cur];
    var prog=Math.round(cur/qs.length*100);
    var html='<div class="card">'
      +'<div class="progress-wrap">'
      +'<div class="progress-meta"><span>質問 '+(cur+1)+' / '+qs.length+'</span><span>'+prog+'%</span></div>'
      +'<div class="progress-track"><div class="progress-fill" style="width:'+prog+'%"></div></div>'
      +'</div>'
      +'<p class="question">'+q.q+'</p>'
      +'<div class="options">';
    for(var i=0;i<q.opts.length;i++){
      var sel=ans[cur]===i?' selected':'';
      html+='<button class="opt-btn'+sel+'" data-idx="'+i+'">'+q.opts[i].t+'</button>';
    }
    html+='</div><div class="navs">'
      +'<button class="nav-btn back'+(cur===0?' dimmed':'')+'" id="bk">← 戻る</button>'
      +'<button class="nav-btn next'+(ans[cur]===null?' dimmed':'')+'" id="nx">'+(cur===qs.length-1?'結果を見る →':'次へ →')+'</button>'
      +'</div></div>';
    root.innerHTML=html;
    var btns=root.querySelectorAll('.opt-btn');
    for(var j=0;j<btns.length;j++){
      (function(idx){
        btns[idx].addEventListener('click',function(){
          var prev=ans[cur];
          if(prev!==null){var pt=qs[cur].opts[prev].s;for(var k in pt)sc[k]-=pt[k];}
          ans[cur]=idx;
          var t=qs[cur].opts[idx].s;for(var k in t)sc[k]+=t[k];
          draw();
        });
      })(j);
    }
    document.getElementById('nx').addEventListener('click',function(){if(ans[cur]===null)return;cur++;draw();});
    document.getElementById('bk').addEventListener('click',function(){if(cur===0){phase='start';draw();return;}cur--;draw();});
  } else {
    var r=getChar();
    var traitDefs=[
      ['行動力','action','#E8607A'],['思考力','logic','#185FA5'],['感情力','emotion','#D4537E'],
      ['統率力','lead','#7C5CBF'],['可愛さ','cute','#E8607A'],['オシャレ','style','#533AB7'],
      ['適応力','adapt','#3B6D11'],['野生味','wild','#C9973A'],['思いやり','care','#E8607A'],['表現力','art','#854F0B']
    ];
    var kws=r.keywords.map(function(k){return '<span class="kw">'+k+'</span>';}).join('');
    var traitHtml='';
    for(var i=0;i<traitDefs.length;i++){
      var lbl=traitDefs[i][0],key=traitDefs[i][1],col=traitDefs[i][2];
      traitHtml+='<div class="trait-row">'
        +'<span class="trait-label">'+lbl+'</span>'
        +'<div class="trait-track"><div class="trait-bar" style="width:'+pct(sc[key],16)+'%;background:'+col+'"></div></div>'
        +'<span class="trait-val">'+sc[key]+'</span>'
        +'</div>';
    }
    root.innerHTML='<div class="result-card">'
      +'<div class="result-hero" style="background:'+r.heroColor+'">'
      +'<span class="result-icon">'+r.icon+'</span>'
      +'<div class="result-badge">あなたに最も近い人物</div>'
      +'<div class="result-name">'+r.name+'</div>'
      +'<div class="result-series">'+r.series+'</div>'
      +'<div class="result-keyword">'+kws+'</div>'
      +'</div>'
      +'<div class="result-body">'
      +'<p class="result-desc">'+r.desc+'</p>'
      +'<div class="traits-title">TRAIT ANALYSIS</div>'
      +traitHtml
      +'<button class="retry-btn" id="re">もう一度診断する</button>'
      +'</div></div>';
    document.getElementById('re').addEventListener('click',function(){
      cur=0;phase='start';
      sc={action:0,logic:0,emotion:0,lead:0,cute:0,style:0,adapt:0,wild:0,care:0,art:0};
      for(var i=0;i<qs.length;i++) ans[i]=null;
      draw();
    });
  }
}

draw();
</script>
</body>
</html>
